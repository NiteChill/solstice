services:
  postgres:
    image: postgres:15-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: solstice_user
      POSTGRES_PASSWORD: solstice_password
      POSTGRES_DB: solstice_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:latest
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - '6379:6379'

volumes:
  postgres_data:
  mongodb_data:
